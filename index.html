<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMeans Cluster Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-container {
            margin-top: 20px;
        }
        
        #result {
            padding: 20px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 4px solid #667eea;
            display: none;
        }
        
        #result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #result h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        #result p {
            margin: 10px 0;
            color: #555;
            font-size: 15px;
        }
        
        #result strong {
            color: #333;
            font-weight: 600;
        }
        
        .cluster-badge {
            display: inline-block;
            background-color: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        #error {
            color: #dc3545;
            margin-top: 15px;
            padding: 12px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            display: none;
        }
        
        #error.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Customer Cluster Prediction</h1>
        <div class="form-group">
            <label for="annual_income">Annual Income (k$):</label>
            <input type="number" id="annual_income" placeholder="e.g., 70" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="spending_score">Spending Score (1-100):</label>
            <input type="number" id="spending_score" placeholder="e.g., 50" step="0.01" min="1" max="100" required>
        </div>
        <button onclick="predictCluster()" id="predictBtn">Predict Cluster</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing customer profile...</p>
        </div>
        
        <div class="result-container">
            <div id="error"></div>
            <div id="result">
                <h3>✓ Prediction Result:</h3>
                <p><strong>Annual Income:</strong> <span id="result_income"></span> k$</p>
                <p><strong>Spending Score:</strong> <span id="result_score"></span></p>
                <p><strong>Predicted Cluster:</strong> <span class="cluster-badge" id="result_cluster"></span></p>
            </div>
        </div>
    </div>

    <script>
        async function predictCluster() {
            const annual_income = document.getElementById('annual_income').value;
            const spending_score = document.getElementById('spending_score').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const predictBtn = document.getElementById('predictBtn');

            // Validation
            if (!annual_income || !spending_score) {
                errorDiv.textContent = 'Please enter both Annual Income and Spending Score.';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
                return;
            }

            if (parseFloat(spending_score) < 1 || parseFloat(spending_score) > 100) {
                errorDiv.textContent = 'Spending Score must be between 1 and 100.';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
                return;
            }

            // Clear previous messages and show loading
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');
            loadingDiv.classList.add('show');
            predictBtn.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        annual_income: parseFloat(annual_income),
                        spending_score: parseFloat(spending_score)
                    })
                });

                const data = await response.json();
                loadingDiv.classList.remove('show');

                if (response.ok) {
                    document.getElementById('result_income').textContent = data.annual_income;
                    document.getElementById('result_score').textContent = data.spending_score;
                    document.getElementById('result_cluster').textContent = data.cluster;
                    resultDiv.classList.add('show');
                    errorDiv.classList.remove('show');
                } else {
                    errorDiv.textContent = `Error: ${data.error || 'Something went wrong'}`;
                    errorDiv.classList.add('show');
                    resultDiv.classList.remove('show');
                }

            } catch (error) {
                loadingDiv.classList.remove('show');
                errorDiv.textContent = 'Failed to connect to the prediction service. Make sure the Flask app is running on http://localhost:5000';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
                console.error('Error:', error);
            } finally {
                predictBtn.disabled = false;
            }
        }

        // Allow Enter key to trigger prediction
        document.getElementById('spending_score').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                predictCluster();
            }
        });
    </script>
</body>
</html>
